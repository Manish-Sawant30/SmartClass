spring.application.name=institute

# JSP view resolver
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Server port
server.port=8086

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/institute
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Content Management Configuration
content.upload.dir=content-uploads

# Create upload directory on startup
spring.servlet.multipart.location=content-uploads

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Change from 'update' to 'validate' or 'none'
spring.jpa.hibernate.ddl-auto=validate 
spring.jpa.show-sql=true
# Change from validate to update
spring.jpa.hibernate.ddl-auto=update
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

content.upload.dir=content-uploads


# Certificate Configuration
certificate.verification.url=${pageContext.request.contextPath}/certificate/public-verify/
certificate.download.enabled=true
certificate.watermark.text=EDU ERA